<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        /* Container */
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        /* Forms */
        form {
            display: flex;
            flex-direction: column;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #45a049;
        }
        /* Dashboard */
        .dashboard {
            max-width: 800px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-top: 0;
            color: #333;
        }
        .logout-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 10px;
            background: #f44336;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>

    <!-- Registration Form -->
    <div class="container">
        <h2>Student Registration</h2>
        <form action="register.php" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="text" name="full_name" placeholder="Full Name">
            <input type="date" name="dob" placeholder="Date of Birth">
            <button type="submit">Register</button>
        </form>
    </div>

    <!-- Login Form -->
    <div class="container">
        <h2>Student Login</h2>
        <form action="login.php" method="POST">
            <input type="text" name="username" placeholder="Username or Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Dashboard Example -->
    <div class="dashboard">
        <div class="card">
            <h3>Profile</h3>
            <p>Name: John Doe</p>
            <p>Email: john@example.com</p>
            <p>DOB: 2000-01-01</p>
        </div>
        <div class="card">
            <h3>Academic Details</h3>
            <p>Maths: 90</p>
            <p>Science: 85</p>
            <p>Attendance: 95%</p>
        </div>
        <div class="card">
            <h3>Notifications</h3>
            <ul>
                <li>Exam on 15th March</li>
                <li>Submit assignment by 12th March</li>
            </ul>
        </div>
        <div class="card">
            <a href="logout.php" class="logout-btn">Logout</a>
        </div>
    </div>

</body>
</html>
